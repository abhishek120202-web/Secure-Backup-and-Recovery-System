<header class="border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="flex items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-2 text-slate-600">
                <i class="bi bi-search"></i>
            </div>
            <label class="hidden min-w-[280px] items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500 sm:flex">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Global search" class="w-full border-0 bg-transparent outline-none">
            </label>
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
            <button class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-600 shadow-sm transition hover:border-slate-300 hover:text-slate-900">
                <i class="bi bi-bell"></i>
            </button>
            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                <div class="flex h-9 w-9 items-center justify-center rounded-full bg-sky-600 text-sm font-semibold text-white">
                    {{ current_user.username[0]|upper if current_user.is_authenticated else 'U' }}
                </div>
                <div class="hidden sm:block">
                    <p class="text-sm font-semibold text-slate-900">{{ current_user.username if current_user.is_authenticated else 'Guest' }}</p>
                    <p class="text-xs text-slate-500">{{ current_user.role if current_user.is_authenticated else 'User' }}</p>
                </div>
            </div>
            <a href="{{ url_for('auth.logout') }}" class="rounded-xl bg-slate-900 px-3 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">
                Logout
            </a>
        </div>
    </div>
</header>
