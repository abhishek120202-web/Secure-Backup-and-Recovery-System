<header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur w-full">
    <div class="flex w-full h-16 items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="lg:hidden inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-50 text-slate-700 hover:bg-slate-100 focus:outline-none" aria-label="Open sidebar">
                <span class="material-symbols-outlined">menu</span>
            </button>

            <div class="relative hidden h-11 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2 shadow-sm sm:flex sm:flex-1">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" placeholder="Search VMs, recovery points, or logs..." class="h-full w-full bg-transparent pl-11 text-sm text-slate-900 outline-none placeholder:text-slate-400 focus:ring-0">
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button class="relative inline-flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-50 text-slate-700 transition hover:bg-slate-100">
                <span class="material-symbols-outlined text-xl">notifications</span>
                <span class="absolute right-2 top-2 inline-flex h-2.5 w-2.5 rounded-full bg-rose-500 ring-2 ring-white"></span>
            </button>

            <div class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2">
                <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-sky-600 text-sm font-semibold text-white">
                    {{ current_user.username[0]|upper if current_user.is_authenticated else 'U' }}
                </div>
                <div class="hidden min-w-[12rem] flex-col text-right sm:flex">
                    <p class="text-sm font-semibold text-slate-900">{{ current_user.username if current_user.is_authenticated else 'Guest' }}</p>
                    <p class="text-xs text-slate-500">{{ current_user.role if current_user.is_authenticated else 'User' }}</p>
                </div>
            </div>

            <a href="{{ url_for('auth.logout') }}" class="inline-flex items-center justify-center rounded-2xl bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">
                <span class="material-symbols-outlined text-base">logout</span>
                <span class="ml-2 hidden sm:inline">Logout</span>
            </a>
        </div>
    </div>
</header>
